$def with (numero_1, numero_2, resultado)
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="ISO-8859-1">
        <title>Calculadora</title>
    </head>
    <body>
        <h1>Calculadora</h1>
        <a href="/">Index</a>

        <form method="POST">
            <label>Número 1:</label><br>
            <input type="number" name="numero_1" id="numero_1" value=$numero_1><br>

            <label>Número 2:</label><br>
            <input type="number" name="numero_2" id="numero_2" value=$numero_2><br>

            <label>Resultado :</label><br>
            <input type="number" name="resultado" id="resultado" value=$resultado><br>
            
            <button name="operacion" id="operacion" value="sumar">Sumar</button>
            <button name="operacion" id="operacion" value="restar">Restar</button>
            <button name="operacion" id="operacion" value="dividir">Dividir</button>
            <button name="operacion" id="operacion" value="multiplicar">Multiplicar</button>
            <button name="operacion" id="operacion" value="modulo">Modulo</button>
            <button name="operacion" id="operacion" value="potencia">Potencia</button>
            <button name="operacion" id="operacion" value="raiz">Raiz</button>
            <button name="operacion" id="operacion" value="limpiar">Limpiar</button>

        </form>
        
    </body>
</html>
