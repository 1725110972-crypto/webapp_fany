$def with ()
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Insertar Contacto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .contenedor { border: 1px solid #000; padding: 20px; max-width: 600px; margin: auto; }
        .fila-formulario { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        input { padding: 5px; width: 200px; }
        .botones { margin-top: 20px; text-align: right; }
        button { margin-left: 10px; padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Contactos - Insertar</h1>
        <form action="/lista_contactos" method="GET">
            <div class="fila-formulario"><label>Nombre</label> <input type="text" placeholder="Escribe el nombre"></div>
            <div class="fila-formulario"><label>Primer Apellido</label> <input type="text" placeholder="Escribe el apellido"></div>
            <div class="fila-formulario"><label>Segundo Apellido</label> <input type="text" placeholder="Segundo apellido"></div>
            <div class="fila-formulario"><label>Teléfono</label> <input type="text" placeholder="Ej. 111111"></div>
            <div class="fila-formulario"><label>Email</label> <input type="text" placeholder="ejemplo@email.com"></div>
            <div class="botones">
                <a href="/lista_contactos"><button type="button">Cancelar</button></a>
                <button type="submit">Guardar</button>
            </div>
        </form>
    </div>
</body>
</html>
